name: release-check

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  publint:
    name: publint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # publint validates package.json shape against ecosystem norms.
      - name: Run publint
        run: pnpm dlx publint

      # Note: arethetypeswrong (attw) is intentionally NOT run here.
      # gacli ships a `bin` only — no library types are exported, and attw
      # treats "no types" as a failure. Bringing it back would require
      # exposing a public library API, which is not the package's purpose.
